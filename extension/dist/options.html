<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FB Marketing Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container" style="max-width: 980px; margin: 0 auto">
      <div class="row" style="justify-content: space-between; margin-bottom: 10px">
        <div>
          <div class="title" style="font-size: 16px">Dashboard</div>
          <div class="muted">Quản lý nội dung, lịch đăng, accounts và anti-ban rules</div>
        </div>
        <div class="row">
          <span id="dashStatus" class="badge">...</span>
          <button id="dashLogout" class="danger">Logout</button>
        </div>
      </div>

      <div class="card">
        <div class="title">Cấu hình</div>
        <div class="row" style="margin-top: 10px">
          <div style="flex: 1">
            <label>Backend Base URL</label>
            <input id="backendBaseUrl" placeholder="http://localhost:4000" />
          </div>
          <div style="flex: 1">
            <label>Facebook App ID</label>
            <input id="facebookAppId" placeholder="App ID" />
          </div>
          <div style="width: 160px; align-self: end">
            <button id="saveConfig" class="primary" style="width: 100%">Save</button>
          </div>
        </div>
        <div id="configMsg" class="muted" style="margin-top: 8px"></div>
      </div>

      <div class="divider"></div>

      <div class="row" style="gap: 12px; align-items: flex-start">
        <div class="card" style="flex: 1">
          <div class="row" style="justify-content: space-between">
            <div>
              <div class="title">Facebook Accounts</div>
              <div class="muted">Connect bằng OAuth (Graph API)</div>
            </div>
            <button id="connectFbDash" class="primary">Connect</button>
          </div>
          <div id="accountsList" class="list" style="margin-top: 10px"></div>
          <div id="accountsMsg" class="muted" style="margin-top: 8px"></div>
        </div>

        <div class="card" style="flex: 1">
          <div class="title">User Settings</div>
          <div class="row" style="margin-top: 10px">
            <div style="flex: 1">
              <label>Posts/day limit</label>
              <input id="postsPerDayLimit" type="number" min="1" max="200" />
            </div>
            <div style="flex: 1">
              <label>Delay min (seconds)</label>
              <input id="delayMin" type="number" min="0" max="3600" />
            </div>
            <div style="flex: 1">
              <label>Delay max (seconds)</label>
              <input id="delayMax" type="number" min="1" max="3600" />
            </div>
            <div style="width: 160px; align-self: end">
              <button id="saveSettings" class="primary" style="width: 100%">Save</button>
            </div>
          </div>
          <div id="settingsMsg" class="muted" style="margin-top: 8px"></div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="row" style="gap: 12px; align-items: flex-start">
        <div class="card" style="flex: 1">
          <div class="title">Templates</div>
          <div class="muted" style="margin-top: 6px">Hỗ trợ spintax: {a|b|c}</div>
          <div class="divider"></div>
          <div class="col">
            <div class="row">
              <div style="flex: 1">
                <label>Name</label>
                <input id="tplName" />
              </div>
              <div style="flex: 1">
                <label>Image URL (optional)</label>
                <input id="tplImageUrl" placeholder="https://..." />
              </div>
            </div>
            <div>
              <label>Text</label>
              <textarea id="tplText"></textarea>
            </div>
            <div class="row" style="justify-content: space-between">
              <button id="tplSpinPreview">Spin preview</button>
              <button id="tplCreate" class="primary">Create template</button>
            </div>
            <div id="tplMsg" class="muted"></div>
          </div>
          <div class="divider"></div>
          <div id="templatesList" class="list"></div>
        </div>

        <div class="card" style="flex: 1">
          <div class="title">Schedule Post</div>
          <div class="col" style="margin-top: 10px">
            <div class="row">
              <div style="flex: 1">
                <label>Account</label>
                <select id="jobAccount"></select>
              </div>
              <div style="width: 160px">
                <label>Target Type</label>
                <select id="jobTargetType">
                  <option value="PAGE">Page</option>
                  <option value="GROUP">Group (requires permission)</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div style="flex: 1">
                <label>Page</label>
                <select id="jobPage"></select>
              </div>
              <div style="flex: 1">
                <label>Group ID (manual)</label>
                <input id="jobGroupId" placeholder="1234567890" />
              </div>
            </div>
            <div class="row">
              <div style="flex: 1">
                <label>Template (optional)</label>
                <select id="jobTemplate">
                  <option value="">(none)</option>
                </select>
              </div>
              <div style="flex: 1">
                <label>Image URL (optional)</label>
                <input id="jobImageUrl" placeholder="https://..." />
              </div>
            </div>
            <div>
              <label>Message (optional nếu chọn template)</label>
              <textarea id="jobMessage"></textarea>
            </div>
            <div class="row">
              <div style="flex: 1">
                <label>Scheduled at (ISO datetime)</label>
                <input id="jobScheduledAt" placeholder="2026-03-26T10:00:00.000Z" />
              </div>
              <div style="width: 200px; align-self: end">
                <button id="jobValidateGroup">Validate group</button>
              </div>
            </div>
            <div class="row" style="justify-content: space-between">
              <label class="row" style="gap: 8px; align-items: center">
                <input id="jobEnableSpin" type="checkbox" checked style="width: auto" />
                Enable spin
              </label>
              <button id="jobCreate" class="primary">Schedule</button>
            </div>
            <div id="jobMsg" class="muted"></div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="card">
        <div class="row" style="justify-content: space-between">
          <div>
            <div class="title">Jobs</div>
            <div class="muted">SCHEDULED/READY/POSTING/POSTED/FAILED</div>
          </div>
          <div class="row">
            <select id="jobsFilter">
              <option value="">All</option>
              <option value="SCHEDULED">SCHEDULED</option>
              <option value="READY">READY</option>
              <option value="POSTING">POSTING</option>
              <option value="POSTED">POSTED</option>
              <option value="FAILED">FAILED</option>
              <option value="CANCELLED">CANCELLED</option>
            </select>
            <button id="jobsRefresh">Refresh</button>
          </div>
        </div>
        <div id="jobsList" class="list" style="margin-top: 10px"></div>
        <div id="jobsMsg" class="muted" style="margin-top: 8px"></div>
      </div>

      <div class="divider"></div>

      <div class="card">
        <div class="row" style="justify-content: space-between">
          <div>
            <div class="title">Audit Logs</div>
            <div class="muted">Theo dõi thao tác và kết quả đăng (server-side)</div>
          </div>
          <div class="row">
            <button id="auditRefresh">Refresh</button>
            <button id="auditMore">Load more</button>
          </div>
        </div>
        <div id="auditList" class="list" style="margin-top: 10px"></div>
        <div id="auditMsg" class="muted" style="margin-top: 8px"></div>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
